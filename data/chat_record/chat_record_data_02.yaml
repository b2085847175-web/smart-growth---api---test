target_env: "dev"

cases:
  - name: "平价面霜咨询"
    questions:
      - "推荐一款平价面霜"
      - "学生党预算不高适合哪款"
      - "保湿效果够不够"
      - "敏感肌可以用吗"
      - "活动下来大概多少钱"

  - name: "便宜洗面奶咨询"
    questions:
      - "推荐一款便宜点的洗面奶"
      - "油皮能用吗"
      - "清洁力够不够"
      - "洗完会不会拔干"
      - "有没有第二件优惠"

  - name: "暗沉提亮精华咨询"
    questions:
      - "推荐一款提亮精华"
      - "最近脸色发黄暗沉适合哪款"
      - "见效快不快"
      - "白天能用吗"
      - "要不要搭配面霜一起用"

  - name: "敏感肌喷雾咨询"
    questions:
      - "推荐一款喷雾"
      - "脸容易泛红刺痛适合哪款"
      - "喷完要不要再擦面霜"
      - "换季的时候能天天用吗"
      - "有小瓶装吗"

  - name: "闭口粉刺护理咨询"
    questions:
      - "推荐一款去闭口的产品"
      - "额头和下巴闭口多适合哪款"
      - "会不会刺激皮肤"
      - "可以和祛痘产品一起用吗"
      - "一般多久能看到改善"

  - name: "黑头鼻贴咨询"
    questions:
      - "推荐一款去黑头产品"
      - "鼻子黑头很多用哪款比较好"
      - "会不会伤毛孔"
      - "敏感肌可以试吗"
      - "用完需要收缩毛孔吗"

  - name: "祛痘印精华咨询"
    questions:
      - "推荐一款祛痘印的精华"
      - "新痘印和老痘印都能用吗"
      - "会不会很刺激"
      - "白天用需要避光吗"
      - "多久能淡一点"

  - name: "混干皮粉底液咨询"
    questions:
      - "推荐一款粉底液"
      - "混干皮上妆卡粉适合哪款"
      - "遮瑕力怎么样"
      - "妆效会不会太厚重"
      - "持妆到下午可以吗"

  - name: "淡妆口红咨询"
    questions:
      - "推荐一款口红"
      - "想要日常淡妆适合哪个颜色"
      - "黄皮涂了显不显白"
      - "会不会沾杯很严重"
      - "有没有温柔一点的色号"

  - name: "眼线笔咨询"
    questions:
      - "推荐一款眼线笔"
      - "新手不太会画适合哪种"
      - "容易晕妆吗"
      - "防水效果怎么样"
      - "好不好卸"

  - name: "眉粉眉笔对比咨询"
    questions:
      - "推荐一款画眉产品"
      - "眉粉和眉笔哪个更适合新手"
      - "自然一点的效果选哪个"
      - "出汗会不会掉"
      - "有没有灰棕色"

  - name: "痘肌遮瑕咨询"
    questions:
      - "推荐一款遮瑕产品"
      - "痘印比较多遮得住吗"
      - "会不会闷痘"
      - "油皮夏天适合吗"
      - "和粉底一起用顺序是什么"

  - name: "防晒喷雾咨询"
    questions:
      - "推荐一款防晒喷雾"
      - "出门补涂方便吗"
      - "喷脸上会不会刺激眼睛"
      - "油皮会不会很油"
      - "需要卸妆吗"

  - name: "身体磨砂膏咨询"
    questions:
      - "推荐一款身体磨砂膏"
      - "手臂粗糙鸡皮适合哪款"
      - "颗粒会不会太大"
      - "一周用几次合适"
      - "用完还要涂身体乳吗"

  - name: "香氛沐浴露咨询"
    questions:
      - "推荐一款香香的沐浴露"
      - "留香久一点的有吗"
      - "洗完会不会很干"
      - "适合女生日常用吗"
      - "有没有套装"

  - name: "头皮屑洗发水咨询"
    questions:
      - "推荐一款去头皮屑洗发水"
      - "头皮容易痒适合哪款"
      - "控屑效果明显吗"
      - "会不会伤头皮"
      - "可以长期用吗"

  - name: "蓬松洗发水咨询"
    questions:
      - "推荐一款蓬松洗发水"
      - "细软塌头发适合哪款"
      - "洗完第二天会不会又塌了"
      - "香味重不重"
      - "有适合夏天的吗"

  - name: "精油护发咨询"
    questions:
      - "推荐一款护发精油"
      - "发尾干枯毛躁适合哪款"
      - "用了会不会显得很油"
      - "湿发和干发都能用吗"
      - "一瓶能用多久"

  - name: "男士控油套装咨询"
    questions:
      - "推荐一款男士护肤套装"
      - "油皮出油多适合哪套"
      - "步骤复杂吗"
      - "洗面奶和水乳都有吗"
      - "现在买划算吗"

  - name: "保湿水乳咨询"
    questions:
      - "推荐一款保湿水乳"
      - "干皮秋冬用哪款更合适"
      - "吸收快不快"
      - "会不会太黏"
      - "适合每天早晚用吗"

  - name: "舒缓精华咨询"
    questions:
      - "推荐一款舒缓精华"
      - "晒后泛红适合哪款"
      - "刺痛的时候能不能用"
      - "要不要放冰箱冷藏"
      - "搭配喷雾效果会更好吗"

  - name: "保湿面膜口语化咨询"
    questions:
      - "推荐一款补水面膜"
      - "有没有那种敷完脸嫩一点的"
      - "我皮肤有点干能不能天天敷"
      - "会不会黏糊糊的"
      - "多买几盒便宜吗"

  - name: "学生党祛痘咨询"
    questions:
      - "推荐一款祛痘产品"
      - "学生党预算不高有没便宜点的"
      - "脸上反复长痘能不能用"
      - "会不会刺激得更严重"
      - "搭配洗面奶一起买有优惠吗"

  - name: "眼部细纹咨询"
    questions:
      - "推荐一款眼霜"
      - "眼下有点细纹适合哪款"
      - "会不会长脂肪粒"
      - "白天化妆前能用吗"
      - "保湿和淡纹哪个效果更明显"

  - name: "唇泥咨询"
    questions:
      - "推荐一款唇泥"
      - "雾面效果会不会太干"
      - "黄皮适合什么颜色"
      - "上嘴显气色吗"
      - "日常通勤适合吗"

  - name: "散粉补妆咨询"
    questions:
      - "推荐一款散粉"
      - "下午容易出油脱妆适合哪款"
      - "补妆会不会斑驳"
      - "粉质够不够细"
      - "外出带着方便吗"

  - name: "卸妆水口语化咨询"
    questions:
      - "推荐一款卸妆水"
      - "平时就画点淡妆能卸干净不"
      - "敏感肌用了会不会辣眼睛"
      - "卸完脸会不会很干"
      - "可以天天用吗"

  - name: "面霜版本选择咨询"
    questions:
      - "推荐一款面霜"
      - "清爽型和滋润型我该怎么选"
      - "混油皮秋冬适合哪个"
      - "保湿差别大不大"
      - "买错了能换吗"

  - name: "美白身体乳咨询"
    questions:
      - "推荐一款身体乳"
      - "想要提亮一点肤色适合哪款"
      - "坚持用会不会有变化"
      - "香味会不会太浓"
      - "夏天用会不会黏"

  - name: "晒后修护咨询"
    questions:
      - "推荐一款晒后修护产品"
      - "出去玩晒红了适合哪款"
      - "冰冰凉凉的那种有吗"
      - "可以搭配面膜一起用吗"
      - "第二天会不会缓解一点"
