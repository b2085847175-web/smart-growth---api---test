target_env: "dev"

cases:
  - name: "洗发水推荐"
    questions:
      - "推荐一款洗发水"
      - "效果怎么样"
      - "有没有优惠活动"
      - "帮我下单"

  - name: "护肤咨询"
    questions:
      - "推荐一款适合干皮的面霜"
      - "保湿效果怎么样"
      - "多少钱"
      - "帮我推荐个套装"

  - name: "售后问题"
    questions:
      - "推荐一款补水喷雾"
      - "敏感肌可以用吗"
      - "我昨天买的订单怎么还没发货"
      - "如果暂时不想要了可以退款吗"

  - name: "彩妆选购"
    questions:
      - "推荐一款显白的口红"
      - "持久度怎么样"
      - "还有其他色号吗"
      - "那我要这支"

  - name: "产品对比"
    questions:
      - "推荐一款洗发水"
      - "你们家洗发水和护发素哪个好用"
      - "成分安全吗"
      - "孕妇可以用吗"

  - name: "敏感肌面霜推荐"
    questions:
      - "推荐一款适合敏感肌的面霜"
      - "有没有酒精和香精"
      - "脸容易泛红可以用吗"
      - "这个保湿效果怎么样"
      - "现在有活动吗"

  - name: "油痘肌祛痘产品咨询"
    questions:
      - "推荐一款适合油痘肌的祛痘产品"
      - "能去闭口和痘印吗"
      - "用了会不会爆痘"
      - "一般多久能见效"
      - "可以和水乳一起用吗"

  - name: "美白精华成分咨询"
    questions:
      - "推荐一款美白精华"
      - "里面含烟酰胺吗"
      - "敏感肌能不能用"
      - "白天用会不会反黑"
      - "要用多久才能提亮"

  - name: "补水套装搭配推荐"
    questions:
      - "推荐一款补水护肤套装"
      - "里面都有什么产品"
      - "适合混合肌吗"
      - "水乳精华的使用顺序是什么"
      - "买一套能用多久"

  - name: "防晒产品咨询"
    questions:
      - "推荐一款防晒霜"
      - "油皮用了会不会很黏"
      - "敏感肌可以用吗"
      - "防晒指数是多少"
      - "需要卸妆吗"

  - name: "清洁泥膜使用咨询"
    questions:
      - "推荐一款清洁泥膜"
      - "能去黑头吗"
      - "一周用几次比较合适"
      - "敏感肌能用吗"
      - "敷完要不要再补水"

  - name: "抗老精华咨询"
    questions:
      - "推荐一款抗老精华"
      - "适合30岁初抗老用吗"
      - "有没有A醇成分"
      - "白天能不能用"
      - "刚开始用需要建立耐受吗"

  - name: "修护面膜咨询"
    questions:
      - "推荐一款修护面膜"
      - "换季脸干还泛红能用吗"
      - "敷完需要洗吗"
      - "一周建议用几次"
      - "有没有赠品"

  - name: "洗面奶温和度咨询"
    questions:
      - "推荐一款温和洗面奶"
      - "敏感肌和学生党可以用吗"
      - "洗完会不会紧绷"
      - "早晚都能用吗"
      - "这个和氨基酸洗面奶有什么区别"

  - name: "爽肤水适用性咨询"
    questions:
      - "推荐一款爽肤水"
      - "油皮毛孔粗大适合哪款"
      - "有没有控油效果"
      - "湿敷可以吗"
      - "和精华一起怎么搭配"

  - name: "孕妇护肤品咨询"
    questions:
      - "推荐一款孕妇能用的护肤品"
      - "有没有刺激性成分"
      - "补水效果怎么样"
      - "面霜和精华都能一起用吗"
      - "有没有适合孕期的套装"

  - name: "口红色号选择"
    questions:
      - "推荐一款适合黄皮的口红"
      - "哪个色号更显白"
      - "会不会拔干"
      - "吃东西容易掉色吗"
      - "还有没有日常通勤色"

  - name: "粉底液妆效咨询"
    questions:
      - "推荐一款粉底液"
      - "混油皮会不会脱妆"
      - "遮瑕力怎么样"
      - "会不会氧化暗沉"
      - "黄一白适合哪个色号"

  - name: "卸妆产品咨询"
    questions:
      - "推荐一款卸妆产品"
      - "淡妆能卸干净吗"
      - "敏感肌适合卸妆油还是卸妆水"
      - "卸完会不会很干"
      - "眼唇也可以一起卸吗"

  - name: "身体乳咨询"
    questions:
      - "推荐一款身体乳"
      - "有没有美白提亮效果"
      - "秋冬干皮适合吗"
      - "香味会不会很重"
      - "坚持用多久能看到效果"

  - name: "祛斑产品咨询"
    questions:
      - "推荐一款淡斑产品"
      - "脸上有痘印和色斑能用吗"
      - "有没有刺激性"
      - "白天用需不需要防晒"
      - "一般多久能看到变化"

  - name: "去黑头产品咨询"
    questions:
      - "推荐一款去黑头产品"
      - "鼻子黑头多适合哪种"
      - "会不会把毛孔越弄越大"
      - "敏感肌能不能用"
      - "用完之后要怎么护理"

  - name: "精华搭配咨询"
    questions:
      - "推荐一款补水精华"
      - "可以和美白精华一起用吗"
      - "先用哪个后用哪个"
      - "早晚都能用吗"
      - "搭配面霜效果会更好吗"

  - name: "新手护肤流程咨询"
    questions:
      - "推荐一款适合新手的护肤产品"
      - "我是干皮应该先买哪些"
      - "护肤的使用顺序是什么"
      - "只买三样的话建议买什么"
      - "有没有入门套装"

  - name: "正品防伪咨询"
    questions:
      - "推荐一款你们卖得好的精华"
      - "这个是正品吗"
      - "可以查防伪吗"
      - "为什么包装和我之前买的不一样"
      - "支持专柜验货吗"

  - name: "发货时效咨询"
    questions:
      - "推荐一款补水面膜"
      - "今天下单什么时候发货"
      - "一般几天能到"
      - "可以加急吗"
      - "现在买有赠品吗"

  - name: "退换货规则咨询"
    questions:
      - "推荐一款修护精华"
      - "如果用了不适合可以退吗"
      - "拆封之后还能申请售后吗"
      - "过敏了怎么处理"
      - "这种情况可以换货吗"

  - name: "漏液售后咨询"
    questions:
      - "推荐一款保湿水"
      - "这个适合敏感肌吗"
      - "如果收到漏液了怎么办"
      - "可以补发吗"
      - "售后处理要多久"

  - name: "版本区别咨询"
    questions:
      - "推荐一款面霜"
      - "新款和老款有什么区别"
      - "滋润版和清爽版怎么选"
      - "油皮更适合哪个"
      - "功效上差别大吗"

  - name: "小样与正装咨询"
    questions:
      - "推荐一款抗老面霜"
      - "先买小样试试可以吗"
      - "小样和正装效果一样吗"
      - "小样一般能用多久"
      - "买正装会送小样吗"

  - name: "男士护肤咨询"
    questions:
      - "推荐一款男士护肤品"
      - "油皮痘痘肌适合哪款"
      - "步骤不要太复杂的有吗"
      - "洗面奶和面霜一起买有优惠吗"
      - "适合日常基础护理吗"

  - name: "学生党预算咨询"
    questions:
      - "推荐一款适合学生党的护肤品"
      - "预算不高的话先买什么"
      - "有没有性价比高一点的套装"
      - "敏感肌也能用吗"
      - "活动价大概多少钱"

  - name: "换季维稳咨询"
    questions:
      - "推荐一款换季维稳的护肤品"
      - "最近脸有点干痒泛红能用吗"
      - "修护屏障效果怎么样"
      - "需要搭配什么一起用"
      - "白天晚上都可以用吗"

  - name: "控油产品咨询"
    questions:
      - "推荐一款控油产品"
      - "夏天出油特别厉害适合哪款"
      - "会不会越用越干"
      - "能同时改善毛孔粗大吗"
      - "适合搭配什么水乳"

  - name: "熬夜肌提亮咨询"
    questions:
      - "推荐一款适合熬夜脸的护肤品"
      - "脸色暗沉发黄用哪种比较好"
      - "提亮效果明显吗"
      - "多久能看到改善"
      - "可以和补水产品一起用吗"
