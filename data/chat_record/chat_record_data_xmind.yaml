target_env: "dev"

cases:
  # ========== 商品基础信息 ==========
  - name: "商品介绍咨询"
    questions:
      - "推荐一款面霜"
      - "这款商品主要是做什么的"
      - "这款和页面另一款有什么区别"
      - "哪款更适合我"

  - name: "规格参数咨询"
    questions:
      - "推荐一款保湿精华"
      - "一瓶多少毫升"
      - "有几个规格可选"
      - "大瓶装划算还是小瓶好"

  - name: "成分信息咨询"
    questions:
      - "推荐一款适合敏感肌的水乳"
      - "含酒精吗"
      - "有没有香精和防腐剂"
      - "成分表里有没有刺激性的东西"

  - name: "功效说明-正常场景"
    questions:
      - "推荐一款精华液"
      - "这款主要功效是什么"
      - "是补水还是修护为主"
      - "能改善暗沉吗"
      - "适合日常维稳吗"

  - name: "功效说明-异常场景"
    questions:
      - "推荐一款祛痘产品"
      - "这款主要功效是什么"
      - "能不能保证一周内把痘痘治好"
      - "用了多久痘印能完全消掉"

  - name: "适用人群咨询"
    questions:
      - "推荐一款面霜"
      - "敏感肌可以用吗"
      - "孕妇能用吗"
      - "学生党合适吗"

  # ========== 选购决策问题 ==========
  - name: "推荐问题-正常场景"
    questions:
      - "我干皮想补水，推荐哪款"
      - "敏感肌能用吗"
      - "价格大概多少"
      - "有没有活动"

  - name: "推荐问题-模糊需求"
    questions:
      - "你推荐哪款"
      - "我是油皮，适合哪个"
      - "第一次买，先入哪一个"
      - "别解释了，直接说最好的"

  - name: "商品对比-正常场景"
    questions:
      - "推荐一款面霜"
      - "你们还有别的款吗"
      - "这两款哪个更适合油皮"
      - "新款和老款差别大吗"
      - "那我选清爽款吧"

  - name: "商品对比-异常场景"
    questions:
      - "推荐一款精华"
      - "A款和B款哪个好"
      - "你就说哪个效果绝对更好"
      - "这两个我该怎么选"

  - name: "规格色号选择咨询"
    questions:
      - "推荐一款口红"
      - "黄皮适合哪个色号"
      - "正装和中样怎么选"
      - "有没有试色图"

  - name: "搭配购买咨询"
    questions:
      - "推荐一款补水精华"
      - "想补水加修护，怎么搭配买"
      - "这款和哪款一起用更好"
      - "搭配买有优惠吗"

  # ========== 使用与效果问题 ==========
  - name: "使用方法咨询"
    questions:
      - "推荐一款精华液"
      - "这个怎么用"
      - "护肤第几步使用"
      - "用量大概多少"

  - name: "使用频次咨询"
    questions:
      - "推荐一款面膜"
      - "一天用几次"
      - "早晚都能用吗"
      - "一周用几次合适"

  - name: "搭配禁忌咨询"
    questions:
      - "推荐一款维C精华"
      - "能和酸类一起用吗"
      - "可以和别的品牌精华叠加吗"
      - "和A醇搭配要注意什么"

  - name: "效果预期咨询"
    questions:
      - "推荐一款美白精华"
      - "一般多久能看到效果"
      - "用了一周感觉没变化正常吗"
      - "需要长期使用吗"

  - name: "不良反应咨询"
    questions:
      - "推荐一款刷酸产品"
      - "用了刺痛正常吗"
      - "会不会闷痘"
      - "过敏了怎么办"

  # ========== 价格与活动问题 ==========
  - name: "价格咨询"
    questions:
      - "推荐一款面霜"
      - "现在多少钱"
      - "最近会降价吗"
      - "有没有更便宜的规格"

  - name: "优惠券满减咨询"
    questions:
      - "推荐一款洗面奶"
      - "有优惠券吗"
      - "店铺券和平台券能叠加吗"
      - "满多少减多少"

  - name: "活动规则咨询"
    questions:
      - "推荐一款防晒霜"
      - "活动什么时候结束"
      - "第二件有优惠吗"
      - "现在买划算还是等大促"

  - name: "赠品套餐咨询"
    questions:
      - "推荐一款护肤套装"
      - "买这个送什么"
      - "套餐里面都有什么"
      - "赠品和正装是一样的吗"

  # ========== 订单与发货问题 ==========
  - name: "下单前咨询"
    questions:
      - "推荐一款洗发水"
      - "这个地区能发吗"
      - "现在下单今天能发吗"
      - "用什么快递"

  - name: "订单修改咨询"
    questions:
      - "推荐一款沐浴露"
      - "我想下单"
      - "地址填错了怎么改"
      - "下单后能改规格吗"

  - name: "库存问题咨询"
    questions:
      - "推荐一款眼霜"
      - "这个规格还有吗"
      - "什么时候补货"
      - "可以先预定吗"

  - name: "发货时效咨询"
    questions:
      - "推荐一款面膜"
      - "多久发货"
      - "预售要等几天"
      - "能加急吗"

  # ========== 物流与履约异常 ==========
  - name: "物流未更新咨询"
    questions:
      - "推荐一款精华"
      - "我之前买的那个为什么物流一直没动"
      - "能帮我催一下吗"
      - "如果一直不动能退款吗"

  - name: "快递延迟咨询"
    questions:
      - "推荐一款面霜"
      - "我的订单怎么还没到"
      - "可以催快递吗"
      - "超时了能不能赔偿"

  - name: "少件漏发咨询"
    questions:
      - "推荐一款护肤套装"
      - "我收到的东西少了一件怎么办"
      - "需要提供什么凭证"
      - "能直接补发吗"

  - name: "丢件破损咨询"
    questions:
      - "推荐一款精华液"
      - "快递丢了怎么办"
      - "收到时包装破损怎么处理"
      - "能直接退款吗"

  # ========== 售后与服务问题 ==========
  - name: "退货退款咨询"
    questions:
      - "推荐一款洗面奶"
      - "买了之后不喜欢可以退吗"
      - "拆封后还能退吗"
      - "退款多久到账"

  - name: "换货补发咨询"
    questions:
      - "推荐一款乳液"
      - "发错货了怎么换"
      - "漏发的可以补发吗"
      - "换货运费谁出"

  - name: "转人工-正常场景"
    questions:
      - "推荐一款面霜"
      - "我要找人工客服"
      - "你帮我转人工"

  - name: "转人工-情绪升级"
    questions:
      - "推荐一款精华"
      - "这个问题你解决不了，转人工"
      - "别机器人回复了"
      - "你别复制粘贴了，给我转人工"

  - name: "投诉与安抚"
    questions:
      - "推荐一款面膜"
      - "我之前的问题一直没解决"
      - "你们处理太慢了"
      - "我要投诉你们"

  # ========== 风险与边界问题 ==========
  - name: "敏感人群咨询"
    questions:
      - "推荐一款面霜"
      - "孕妇能用吗"
      - "烂脸期间能用吗"
      - "哺乳期可以用吗"

  - name: "医疗化提问"
    questions:
      - "推荐一款祛痘产品"
      - "能不能治痘痘"
      - "这个能修复激素脸吗"
      - "用了多久能痊愈"

  - name: "真伪授权保质期咨询"
    questions:
      - "推荐一款精华"
      - "是正品吗"
      - "保质期多久"
      - "有没有授权证书"

  - name: "知识库外问题"
    questions:
      - "推荐一款洗面奶"
      - "线下门店有卖吗"
      - "和别的品牌比哪个更好"
      - "你们品牌是哪个国家的"

  - name: "无法判断需升级"
    questions:
      - "推荐一款面霜"
      - "页面没写清楚，你确定吗"
      - "如果你不清楚就转人工"
      - "我要一个准确的答案"
