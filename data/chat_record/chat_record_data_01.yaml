target_env: "dev"

cases:
  - name: "控油洗发水咨询"
    questions:
      - "推荐一款控油洗发水"
      - "头发容易出油适合哪款"
      - "洗完会不会很干"
      - "有大瓶装吗"
      - "现在买有活动吗"

  - name: "防脱洗发水咨询"
    questions:
      - "推荐一款防脱洗发水"
      - "掉发比较多能改善吗"
      - "适合天天洗头的人吗"
      - "男生可以用吗"
      - "一般要用多久能看到效果"

  - name: "护发素搭配咨询"
    questions:
      - "推荐一款护发素"
      - "头发毛躁打结适合哪款"
      - "能和洗发水搭配一起买吗"
      - "用了会不会很油"
      - "有没有套装优惠"

  - name: "沐浴露香味咨询"
    questions:
      - "推荐一款沐浴露"
      - "有没有留香久一点的"
      - "敏感肌能用吗"
      - "洗完会不会假滑"
      - "适合夏天用吗"

  - name: "男士洗面奶咨询"
    questions:
      - "推荐一款男士洗面奶"
      - "油皮痘痘肌适合哪款"
      - "清洁力怎么样"
      - "洗完会不会紧绷"
      - "可以早晚都用吗"

  - name: "黑眼圈眼霜咨询"
    questions:
      - "推荐一款眼霜"
      - "黑眼圈和细纹都想改善用哪款"
      - "眼周敏感可以用吗"
      - "白天晚上都能用吗"
      - "要坚持多久才有效果"

  - name: "祛痘贴咨询"
    questions:
      - "推荐一款祛痘产品"
      - "痘痘冒白头的时候可以用吗"
      - "晚上贴着睡觉行不行"
      - "会不会刺激皮肤"
      - "一包大概有多少片"

  - name: "唇膏保湿咨询"
    questions:
      - "推荐一款唇膏"
      - "嘴唇干裂起皮适合哪款"
      - "涂上会不会很油"
      - "有没有无香型的"
      - "孕妇可以用吗"

  - name: "隔离霜咨询"
    questions:
      - "推荐一款隔离霜"
      - "黄皮适合哪个颜色"
      - "会不会假白"
      - "可以直接代替底妆吗"
      - "持久度怎么样"

  - name: "散粉定妆咨询"
    questions:
      - "推荐一款散粉"
      - "油皮夏天容易脱妆适合哪款"
      - "会不会卡粉"
      - "有没有提亮效果"
      - "小包装方便带出门吗"

  - name: "腮红色号咨询"
    questions:
      - "推荐一款腮红"
      - "黄皮显气色适合哪个颜色"
      - "新手会不会下手太重"
      - "粉质细不细"
      - "日常上班适合吗"

  - name: "眉笔咨询"
    questions:
      - "推荐一款眉笔"
      - "新手好上手吗"
      - "深发色适合哪个色号"
      - "防水防汗效果怎么样"
      - "会不会容易结块"

  - name: "睫毛膏咨询"
    questions:
      - "推荐一款睫毛膏"
      - "纤长和浓密效果哪个更明显"
      - "会不会晕妆"
      - "好不好卸"
      - "适合短睫毛吗"

  - name: "卸妆膏清洁力咨询"
    questions:
      - "推荐一款卸妆膏"
      - "防水彩妆能卸干净吗"
      - "乳化快不快"
      - "敏感肌适合吗"
      - "会不会闷痘"

  - name: "面膜补水咨询"
    questions:
      - "推荐一款补水面膜"
      - "皮肤干到起皮适合哪款"
      - "敷完脸会不会黏"
      - "一周用几次合适"
      - "买多盒有优惠吗"

  - name: "早C晚A搭配咨询"
    questions:
      - "推荐一款维C精华"
      - "可以和A醇一起搭配吗"
      - "早上用会不会刺激"
      - "敏感肌怎么建立耐受"
      - "还需要搭配什么产品"

  - name: "屏障修护咨询"
    questions:
      - "推荐一款修护产品"
      - "最近脸有点刺痛泛红适合哪款"
      - "有没有神经酰胺成分"
      - "可以和其他精华一起用吗"
      - "多久能缓解一点"

  - name: "毛孔粗大护理咨询"
    questions:
      - "推荐一款改善毛孔粗大的产品"
      - "油皮鼻翼两侧毛孔明显适合哪款"
      - "会不会刺激"
      - "需要长期用吗"
      - "能不能搭配清洁泥膜一起用"

  - name: "妆前乳咨询"
    questions:
      - "推荐一款妆前乳"
      - "毛孔明显上妆不服帖适合哪款"
      - "会不会搓泥"
      - "适合混油皮吗"
      - "和粉底一起用持妆会更好吗"

  - name: "遮瑕产品咨询"
    questions:
      - "推荐一款遮瑕产品"
      - "黑眼圈和痘印都能遮吗"
      - "会不会很干卡纹"
      - "黄皮适合哪个色号"
      - "新手好不好用"

  - name: "定妆喷雾咨询"
    questions:
      - "推荐一款定妆喷雾"
      - "夏天出汗容易脱妆适合哪款"
      - "喷出来细不细"
      - "会不会让妆面发黏"
      - "敏感肌可以用吗"

  - name: "香水身体喷雾咨询"
    questions:
      - "推荐一款身体喷雾"
      - "有没有淡一点的花果香"
      - "留香时间大概多久"
      - "学生党适合吗"
      - "可以喷衣服上吗"

  - name: "护手霜咨询"
    questions:
      - "推荐一款护手霜"
      - "手很干还有倒刺适合哪款"
      - "吸收快不快"
      - "会不会很油不好打字"
      - "有没有便携装"

  - name: "洗护套装咨询"
    questions:
      - "推荐一款洗护套装"
      - "头发干枯毛躁适合哪套"
      - "洗发水和护发素能单独买吗"
      - "香味重不重"
      - "套装比单买便宜多少"

  - name: "儿童洗护咨询"
    questions:
      - "推荐一款洗护产品"
      - "小朋友可以用吗"
      - "成分温和吗"
      - "会不会刺激眼睛"
      - "有没有无泪配方"

  - name: "旅行装咨询"
    questions:
      - "推荐一款旅行装护肤品"
      - "短期出差带着方便吗"
      - "里面一般包含哪些产品"
      - "上飞机可以直接带吗"
      - "和正装效果一样吗"

  - name: "熬夜急救面膜咨询"
    questions:
      - "推荐一款急救面膜"
      - "熬夜之后脸色差适合哪款"
      - "第二天上妆会不会更服帖"
      - "敏感肌可以敷吗"
      - "需要冷藏吗"

  - name: "去角质产品咨询"
    questions:
      - "推荐一款去角质产品"
      - "脸上容易粗糙起皮适合哪种"
      - "敏感肌能不能用"
      - "多久用一次比较好"
      - "用完之后需要敷面膜吗"

  - name: "香波染后护理咨询"
    questions:
      - "推荐一款洗发水"
      - "染发后头发干枯适合哪款"
      - "会不会影响发色"
      - "需要搭配护发素吗"
      - "多久洗一次比较合适"

  - name: "痘肌防晒咨询"
    questions:
      - "推荐一款防晒霜"
      - "痘痘肌用了会不会闷痘"
      - "上脸会不会泛白"
      - "要不要卸妆"
      - "可以和隔离一起用吗"

  - name: "夜间修护精华咨询"
    questions:
      - "推荐一款夜间修护精华"
      - "熬夜后皮肤状态差适合哪款"
      - "晚上用了白天还要继续用吗"
      - "和面霜一起用顺序是什么"
      - "有没有小样可以先试"
