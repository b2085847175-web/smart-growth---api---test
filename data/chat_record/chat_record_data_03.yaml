target_env: "dev"

cases:
  - name: "孕妇面霜咨询"
    questions:
      - "推荐一款面霜"
      - "孕妇现在能用哪款"
      - "里面有没有刺激性成分"
      - "保湿够不够"
      - "可以天天早晚都用吗"

  - name: "哺乳期精华咨询"
    questions:
      - "推荐一款精华"
      - "哺乳期适合用哪款"
      - "有没有美白成分太强的那种"
      - "敏感肌也能用吗"
      - "搭配面霜一起用会不会更好"

  - name: "过敏后修护咨询"
    questions:
      - "推荐一款修护产品"
      - "我脸有点过敏泛红还能用吗"
      - "会不会越用越刺激"
      - "现在是先停掉其他产品吗"
      - "大概多久能缓一缓"

