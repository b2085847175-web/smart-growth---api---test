        content: "https://item.taobao.com/item.htm?id=1020502502042"
      - role: "assistant"
        content: "亲亲，这款染发露不仅可以均匀上色自然显色，不需要漂发就能覆盖白发，还添加了植物萃取和蛋白修护精华，能改善毛躁修护发丝哦。"
      - role: "user"
        content: "警告"
      - role: "assistant"
        content: "他是无氨配方很温和，色号都适配亚洲肤色很显白，染一次效果能维持约半年，2-3月轻微掉色后颜色也依然好看呢。"
      - role: "user"
        content: "警告"
      - role: "assistant"
        content: "[图片消息]"
      - role: "user"
        content: "警告"
      - role: "user"
        content: "齐腰发得用几盒呢"
