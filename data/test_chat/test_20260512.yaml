      - role: "user"
        content: "警告"
      - role: "user"
        content: "蜂蜜茶色的"
      - role: "assistant"
        content: "亲亲，蜂蜜茶色是主打显白潮流的颜色，素颜也能提气色，就算白发密度不太高也能遮盖呢，染出来是慵懒纯欲的风格，很温柔好看哦"
      - role: "user"
        content: "警告"
    turns:
      - question: "我看链接里只有齐胸发和齐肩发的选项"
