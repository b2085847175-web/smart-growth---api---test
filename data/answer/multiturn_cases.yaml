# /chat/answer 多轮对话造数据
# - 文件用途：保留原上下文和原多轮对话用例，用于造连续会话数据。
# - assertions：false 表示不做业务断言，不校验 expect、match_score、质检或 final_reply。
# - quality：false 表示不查询质检记录，仅发送 /chat/answer 请求并累积回复。
# - cases：questions/turns 中的多条问题会按顺序发送。
suite:
  name: multiturn
  mode: sequential
  quality: false
  match_score: false
  final_reply_equals_chat: false
  turn_interval_seconds: 1
  assertions: false
target_env: dev
